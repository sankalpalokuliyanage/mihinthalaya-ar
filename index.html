<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Poson 2026 | 3D Digital Experience</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --poson-gold: #ffd700;
            --deep-dark: #03001e;
            --cyber-purple: #7303c0;
        }

        body {
            /* මීහින්තලා පුදබිම සහ සයිබර් කලාව සිහිගන්වන අලංකාර පසුබිම් ආලෝකය */
            background: radial-gradient(circle at center, #1f1147 0%, #11072b 50%, var(--deep-dark) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 0 25px 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphism Dashboard Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(115, 3, 192, 0.25), inset 0 0 20px rgba(0, 242, 255, 0.05);
            overflow: hidden;
            position: relative;
            transition: border 0.5s ease;
        }

        .glass-card:hover {
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        model-viewer {
            width: 100%;
            height: 520px;
            background-color: transparent;
        }

        /* AR Button එක මැද තබා ගැනීමට සහ Hover වීමේදී සිදුවන සෙලවීම් වැළැක්වීමට සකස් කළ බොත්තම */
        .cyber-btn {
            border-radius: 50px;
            padding: 12px 35px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), #0066ff);
            color: white;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        .cyber-btn:hover {
            box-shadow: 0 0 25px var(--neon-blue);
            transform: translate(-50%, -3px) !important;
            color: white;
        }

        /* Loading Screen අලංකරණය */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(3, 0, 30, 0.9);
            z-index: 10;
            transition: opacity 0.6s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        /* Typography & Header Branding */
        .main-title {
            font-size: 3rem;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(115, 3, 192, 0.6);
        }

        .poson-text {
            color: var(--poson-gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .cyber-year {
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        /* Footer සහ සංවිධාන විස්තර */
        .footer-text {
            margin-bottom: 5px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .association-text {
            font-size: 0.95rem;
            letter-spacing: 3px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .dev-name {
            color: var(--neon-blue);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }
    </style>
</head>

<body>

    <main class="main-wrapper container">
        <div class="row justify-content-center w-100">
            <div class="col-lg-8 text-center mb-4">
                <h1 class="main-title fw-bold">Cyber <span class="poson-text">Poson</span> <span class="cyber-year">2026</span></h1>
                <p class="text-white-50 small text-uppercase tracking-wide">Mihintale 3D Digital Lantern Experience</p>
            </div>

            <div class="col-lg-9 position-relative">
                <div class="glass-card">

                    <div id="loading-overlay" aria-live="polite">
                        <div class="spinner-border text-info mb-3" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <span class="small text-white-50 text-uppercase" style="letter-spacing: 2px;">Preparing 3D Aura...</span>
                    </div>

                    <model-viewer id="mutti-viewer" 
                        src="mihin_test2-v1.glb" 
                        alt="Cyber Poson Mihintale 3D Digital Display"
                        draco-decoder-path="https://www.gstatic.com/draco/versioned/decoders/1.5.6/"
                        power-preference="high-performance"
                        ar 
                        ar-modes="webxr scene-viewer quick-look"
                        camera-controls 
                        auto-rotate 
                        rotation-per-second="20deg"
                        interaction-prompt-delay="0"
                        shadow-intensity="1.5" 
                        camera-orbit="auto auto auto"
                        interaction-prompt="auto">

                        <button slot="ar-button"
                            class="cyber-btn position-absolute bottom-0 start-50 translate-middle-x mb-4">
                            ✨ VIEW IN AR
                        </button>

                    </model-viewer>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center w-100">
        <p class="footer-text">Developed by <span class="dev-name">Sankalpa Lokuliyanage</span></p>
        <p class="association-text text-uppercase">Sri Lanka Student Association <span style="color: var(--neon-blue);">|</span> SLSA</p>
    </footer>

    <script>
        const modelViewer = document.querySelector('#mutti-viewer');
        const loadingOverlay = document.querySelector('#loading-overlay');

        // Asset Initialization Event Hook
        modelViewer.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
            modelViewer.autoRotate = true;
            console.log("Mihintale 3D Scene initialized seamlessly.");
        });

        // Network or Rendering Exception Hook
        modelViewer.addEventListener('error', (error) => {
            console.error("Critical asset disruption:", error);
            loadingOverlay.innerHTML = `
                <div class="text-danger text-center p-5">
                    <h5 class="fw-bold mb-2">3D Scene Translation Error</h5>
                    <p class="small text-white-50">Please verify that "mihin_test2-v1.glb" is correctly compiled and present in your directory.</p>
                </div>`;
        });
    </script>

</body>

</html>
