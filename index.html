<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poson Poya 2026 | 3D Digital Experience</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --poson-gold: #ffd700;
            --pure-white: #ffffff;
            --deep-spiritual: #08071a;
            --aura-glow: rgba(255, 215, 0, 0.2);
            --buddhist-blue: #0044ff;
        }

        body {

            background: radial-gradient(circle at center, #0d1b3e 0%, #060b1e 60%, var(--deep-spiritual) 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 0 25px 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }


        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.08), inset 0 0 20px rgba(255, 255, 255, 0.02);
            overflow: hidden;
            position: relative;
            transition: all 0.5s ease;
            width: 100%;
        }

        .glass-card:hover {
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
        }

        model-viewer {
            width: 100%;
            height: 600px;
            background-color: transparent;
        }

        .poson-btn {
            border-radius: 50px;
            padding: 12px 40px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            background: linear-gradient(45deg, #cc9900, var(--poson-gold));
            color: #03001e;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .poson-btn:hover {
            box-shadow: 0 0 30px var(--poson-gold);
            transform: translate(-50%, -4px) !important;
            color: #000;
            background: linear-gradient(45deg, var(--poson-gold), #fff);
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(6, 11, 30, 0.95);
            z-index: 10;
            transition: opacity 0.6s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        .main-title {
            font-size: 3rem;
            letter-spacing: 2px;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            color: var(--pure-white);
        }

        .poson-text {
            color: var(--poson-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .year-text {
            color: var(--pure-white);
            font-weight: 300;
        }

        .footer-text {
            margin-bottom: 6px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .association-text {
            font-size: 0.90rem;
            letter-spacing: 3px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .dev-name {
            color: var(--poson-gold);
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
    </style>
</head>

<body>

    <main class="main-wrapper container">
        <div class="row justify-content-center w-100">
            <div class="col-lg-8 text-center mb-4">
                <h1 class="main-title fw-bold"><span class="poson-text">South Korea</span> Poson <span class="year-text">2026</span></h1>
                <p class="text-white-50 small text-uppercase tracking-wide" style="letter-spacing: 3px;">Mihintale 3D Digital Spiritual Experience</p>
            </div>

            <div class="col-lg-10 position-relative">
                <div class="glass-card">

                    <div id="loading-overlay" aria-live="polite">
                        <div class="spinner-border text-warning mb-3" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <span class="small text-white-50 text-uppercase" style="letter-spacing: 2px;">Evoking 3D Mihintala Aura...</span>
                    </div>

                    <model-viewer id="mutti-viewer" 
                        src="mihinthaleblend-v1.glb" 
                        alt="Mihintale Poson Poya 3D Digital Display"
                        draco-decoder-path="https://www.gstatic.com/draco/versioned/decoders/1.5.6/"
                        power-preference="high-performance"
                        ar 
                        ar-modes="webxr scene-viewer quick-look"
                        ar-scale="auto"
                        camera-controls 
                        auto-rotate 
                        rotation-per-second="15deg"
                        interaction-prompt-delay="0"
                        shadow-intensity="2" 
                        camera-orbit="0deg 75deg 2m"
                        min-camera-orbit="auto auto 0.5m"
                        max-camera-orbit="auto auto 5m"
                        interaction-prompt="auto">

                        <button slot="ar-button"
                            class="poson-btn position-absolute bottom-0 start-50 translate-middle-x mb-4">
                            🙏 START
                        </button>

                    </model-viewer>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center w-100">
        <p class="footer-text">Developed by <span class="dev-name">Sankalpa Lokuliyanage</span> & <span class="dev-name">Thathsara Nanayakkara</span></p>
    </footer>

    <script>
        const modelViewer = document.querySelector('#mutti-viewer');
        const loadingOverlay = document.querySelector('#loading-overlay');

        modelViewer.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
            modelViewer.autoRotate = true;
            console.log("Mihintale 3D Spiritual Scene initialized successfully.");
        });

        modelViewer.addEventListener('error', (error) => {
            console.error("Asset disruption:", error);
            loadingOverlay.innerHTML = `
                <div class="text-warning text-center p-5">
                    <h5 class="fw-bold mb-2">3D Scene Loading Error</h5>
                    <p class="small text-white-50">Please ensure "mihin_test2.glb" is correctly placed in your project root folder.</p>
                </div>`;
        });
    </script>

</body>

</html>
